upstream cleaning_backend_server {
    server backend:5002;
}

upstream cleaning_frontend_server {
    server frontend:5175;
}

server {
    listen 80;
    client_max_body_size 50M;
    server_name 153.92.209.177; 

    # API Requests
    location /api/ {
        proxy_pass http://cleaning_backend_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Images/Uploads
    location /uploads/ {
        proxy_pass http://cleaning_backend_server/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin *;
    }

    # Frontend Requests
    location / {
        proxy_pass http://cleaning_frontend_server;
        
        # WebSockets support (Vite/React ke liye zaroori hai)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings
        proxy_read_timeout 90;
        proxy_connect_timeout 90;
    }
}